<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!--
    ChainTrust social-preview card.
    1200×630 (Open Graph spec). SVG renders crisp on retina and is
    what every modern social platform (X, LinkedIn, Discord, Slack,
    iMessage) accepts. Replace with a designed PNG when ready.
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="950" cy="180" r="320" fill="url(#halo)" />

  <!-- Brand mark (simplified) -->
  <g transform="translate(100,180)">
    <circle cx="36" cy="36" r="34" fill="url(#brand)" />
    <path d="M 22 36 L 32 46 L 52 26" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <text x="92" y="49" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="700" fill="#E2E8F0">ChainTrust</text>
  </g>

  <!-- Headline -->
  <text x="100" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#F8FAFC">
    Verify startups
  </text>
  <text x="100" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#3B82F6">
    on-chain.
  </text>

  <!-- Subhead -->
  <text x="100" y="470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="500" fill="#94A3B8">
    Treasury proofs · Pyth oracle pricing · cNFT certificates
  </text>

  <!-- Footer chips -->
  <g font-family="ui-monospace, 'Cascadia Code', monospace" font-size="20" font-weight="600">
    <rect x="100" y="520" width="170" height="44" rx="22" fill="#1E293B" stroke="#334155" />
    <text x="120" y="549" fill="#3B82F6">$0.00025/verify</text>

    <rect x="290" y="520" width="140" height="44" rx="22" fill="#1E293B" stroke="#334155" />
    <text x="310" y="549" fill="#10B981">2s settlement</text>

    <rect x="450" y="520" width="180" height="44" rx="22" fill="#1E293B" stroke="#334155" />
    <text x="470" y="549" fill="#A78BFA">75 ML engines</text>
  </g>

  <!-- Built on Solana -->
  <text x="1100" y="600" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500" fill="#64748B">
    Built on Solana · Frontier Hackathon · May 11, 2026
  </text>
</svg>
